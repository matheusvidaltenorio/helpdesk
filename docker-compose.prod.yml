# Docker Compose - Produção (stack completo)
#
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# Serviços: PostgreSQL, Backend (Node), Frontend (Nginx)
# Acesso: http://localhost (frontend + API via proxy)

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk-db-prod
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: helpdesk-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: helpdesk
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-altere_em_producao}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: helpdesk-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data_prod:
